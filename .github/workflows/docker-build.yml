name: Publish Docker images

on:
  # 发布新 release 时自动触发
  release:
    types: [published]
  # 支持手动点击触发
  workflow_dispatch:

env:
  # GHCR 镜像：ghcr.io/<owner>/<repo>-<component>
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  # Docker Hub 镜像：<user>/agentforge-<component>
  DOCKERHUB_IMAGE: zhengwenfeng/agentforge

jobs:
  docker:
    name: Build and Push ${{ matrix.component }} Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # 后端 Go API 镜像
          - component: api
            context: ./services/api
          # 前端 Next.js 镜像
          - component: web
            context: ./web
    steps:
      # 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 启用 QEMU（用于跨架构构建）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 启用 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub（DOCKER_USERNAME / DOCKER_PASSWORD）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 登录 GitHub Container Registry（PUSH_GITHUB_TOKEN）
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PUSH_GITHUB_TOKEN }}

      # 自动生成 Docker tags 和 OCI labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}-${{ matrix.component }}
            ${{ env.DOCKERHUB_IMAGE }}-${{ matrix.component }}
          tags: |
            # release tag（如 v1.0.0）
            type=ref,event=tag
            # latest
            type=raw,value=latest
            # semver（如 1.0.0）
            type=semver,pattern={{version}}
            # 手动触发时基于 commit sha 的短 tag
            type=sha,format=short

      # 构建并推送多架构镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          # 多架构
          platforms: linux/amd64,linux/arm64
          # 推送镜像
          push: true
          # metadata-action 自动生成
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache（按组件隔离，避免互相覆盖）
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          # provenance / sbom
          provenance: true
          sbom: true
