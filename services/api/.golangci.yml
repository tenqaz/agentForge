version: 2

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unparam
    - gocritic
    - gosec
    - bodyclose
    - nilerr

linters-settings:
  errcheck:
    check-blank: true
  gosec:
    excludes:
      - G124  # Cookie 属性测试
      - G304  # 文件包含

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - unparam
        - unused
