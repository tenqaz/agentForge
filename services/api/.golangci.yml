run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: '1.24'

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gosec
    - bodyclose
    - sqlclosecheck
    - nilerr
    - errname
    - errorlint
    - revive
    - stylecheck
    - whitespace
    - gocyclo
    - gofumpt

linters-settings:
  errcheck:
    check-blank: true
  gocyclo:
    min-complexity: 15
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
